name: Run Detox Tests
on: [pull_request]

jobs:
    build-and-test-ios:
        name: iOS - Build and run Detox tests
        runs-on: macos-13-xlarge

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.2.0

            - name: Npm install
              run: npm install

            - name: Pod install
              run: cd ios && pod install

            - name: Build Detox
              run: npm run detox:ios:build

            - name: Start Metro Server
              run: npm run detox:start &

            - name: Install Applesimutils
              run: |
                  brew tap wix/brew
                  brew install applesimutils
            - name: Run Detox tests
              run: npm run detox:ios:test:ci

            - name: Upload Test Artifact
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: detox-ios-artifacts
                  path: artifacts
                  retention-days: 5

    build-and-test-android:
        name: Android - Build and run Detox tests
        runs-on: ubuntu-latest
        steps:
            - name: Free Disk Space (Ubuntu)
              uses: jlumbroso/free-disk-space@main
              with:
                  tool-cache: true
                  android: false

            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.2.0

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: zulu
                  java-version: 17

            - name: Npm install
              run: npm install

            - name: Build Detox
              run: npm run detox:android:build

            - name: Run Detox tests
              uses: reactivecircus/android-emulator-runner@v2
              with:
                  api-level: 31
                  arch: x86_64
                  avd-name: Android_API31
                  force-avd-creation: false
                  emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-metrics
                  disable-animations: true
                  script: |
                    # 1. Start Metro in the background and pipe logs to a file
                    # We use REACT_TERMINAL_RUN_INTERACTIVE=false to prevent the DevTools crash
                    export REACT_TERMINAL_RUN_INTERACTIVE=false
                    npm run detox:start > metro.log 2>&1 &
                    
                    # 2. Wait for Metro port (8081) to be active
                    echo "Waiting for Metro to start..."
                    npx wait-on http://127.0.0.1:8081 --timeout 120000
                    
                    # 3. Run the tests
                    npm run detox:android:test:ci

            - name: Upload Test Artifact
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: detox-android-artifacts
                  path: |
                    artifacts
                    metro.log
                  retention-days: 5
