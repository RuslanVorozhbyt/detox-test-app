name: Run Detox Tests
on: 
  pull_request:
jobs:
  build-and-test-ios:
    name: iOS - Build and run Detox tests
    runs-on: macos-latest # Uses the latest Apple Silicon runners (Fastest)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Npm install
        run: npm install

      - name: Pod install
        run: cd ios && pod install

      - name: Build Detox
        run: npm run detox:ios:build

      - name: Install Applesimutils
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Run Detox tests
        run: |
          # Start Metro and Detox server in background
          npm run detox:start & 
          # Run tests with extra logs to catch "ready" signal issues
          npm run detox:ios:test:ci -- --loglevel trace

      - name: Upload Test Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-ios-artifacts
          path: artifacts
          retention-days: 5

  build-and-test-android:
    name: Android - Build and run Detox tests
    runs-on: ubuntu-latest

    steps:
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Npm install
        run: npm install

      - name: Build Detox
        run: npm run detox:android:build

      - name: Run Detox tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          avd-name: Android_API31
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # 1. Reverse ports so Emulator sees the Runner's localhost
            $ANDROID_HOME/platform-tools/adb reverse tcp:8081 tcp:8081
            $ANDROID_HOME/platform-tools/adb reverse tcp:8099 tcp:8099
            
            # 2. Start Metro in background
            npm run detox:start &
            
            # 3. Start Detox standalone server on the port in your .detoxrc.js
            npx detox start --port 8099 &
            
            # 4. Wait for servers to breathe, then run tests
            sleep 10
            npm run detox:android:test:ci -- --loglevel trace

      - name: Upload Test Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-android-artifacts
          path: artifacts
          retention-days: 5
