name: Run Detox Tests
on: [pull_request]

jobs:

    build-and-test-ios:
        name: iOS - Build and run Detox tests
        runs-on: macos-13

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                fetch-depth: 1

    build-and-test-android:
        name: Android - Build and run Detox tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                fetch-depth: 1
